components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PoolId:
      name: poolId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      example: 1
    ShopId:
      name: shopId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      example: 1
    ScriptId:
      name: scriptId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      example: 1
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      example: 2
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
      example: 1
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 10
      example: 10
    City:
      name: city
      in: query
      required: false
      schema:
        type: string
      example: 上海
    ScriptType:
      name: scriptType
      in: query
      required: false
      schema:
        type: string
      example: 硬核
    Status:
      name: status
      in: query
      required: false
      schema:
        type: integer
    PriceMin:
      name: priceMin
      in: query
      required: false
      schema:
        type: number
        format: double
    PriceMax:
      name: priceMax
      in: query
      required: false
      schema:
        type: number
        format: double
    StartTimeAfter:
      name: startTimeAfter
      in: query
      required: false
      schema:
        type: string
      example: '2026-06-01 00:00:00'
    StartTimeBefore:
      name: startTimeBefore
      in: query
      required: false
      schema:
        type: string
      example: '2026-06-30 23:59:59'
    Recommend:
      name: recommend
      in: query
      required: false
      schema:
        type: boolean
        default: false

  responses:
    Ok:
      description: 操作成功
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BaseResult'

  schemas:
    BaseResult:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          nullable: true

    LoginResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LoginVO'

    UserResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserVO'

    UserListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/UserVO'

    PoolResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PoolVO'

    PoolListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/PoolVO'

    MemberListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/MemberVO'

    ConfirmResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ConfirmVO'

    OrderResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/OrderVO'

    OrderListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/OrderVO'

    ScriptResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ScriptVO'

    ScriptListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ScriptVO'

    ShopResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ShopVO'

    ShopListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ShopVO'

    ShopMemberListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ShopMemberVO'

    ReviewListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ReviewVO'

    MessageListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/MessageVO'

    ChatMessageListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ChatMessageVO'

    PlayerPreferenceResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PlayerPreferenceVO'

    CreditLogListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CreditLogVO'

    RoleStatusListResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RoleStatusVO'

    IntegerResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: integer

    TokenRefreshResult:
      allOf:
        - $ref: '#/components/schemas/BaseResult'
        - type: object
          properties:
            data:
              type: object
              properties:
                accessToken:
                  type: string

    RegisterRequest:
      type: object
      required: [phone, password, nickname, role]
      properties:
        phone:
          type: string
          example: '13800000001'
        password:
          type: string
          example: abc123456
        nickname:
          type: string
          example: 玩家一号
        gender:
          type: integer
          example: 1
        role:
          type: string
          enum: [player, shop]
          example: player
        city:
          type: string
          example: 上海

    LoginRequest:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
          example: '13800000001'
        password:
          type: string
          example: abc123456

    LoginVO:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserVO'

    UserVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        phone:
          type: string
        nickname:
          type: string
        avatar:
          type: string
        gender:
          type: integer
        role:
          type: integer
          description: 0-玩家 1-店家 2-管理员
        city:
          type: string
        preference:
          type: string
        creditScore:
          type: integer
        status:
          type: integer

    UserUpdateRequest:
      type: object
      properties:
        nickname:
          type: string
        avatar:
          type: string
        gender:
          type: integer
        city:
          type: string
        preference:
          type: string

    PoolCreateRequest:
      type: object
      required: [scriptName, city, startTime, maxMembers]
      properties:
        type:
          type: integer
          description: 0-玩家局 1-店家局
        scriptId:
          type: integer
          format: int64
        shopId:
          type: integer
          format: int64
        scriptName:
          type: string
        scriptType:
          type: string
        roles:
          type: string
          description: 角色列表 JSON 字符串
        city:
          type: string
        address:
          type: string
        startTime:
          type: string
          example: '2026-06-01 14:00:00'
        endTime:
          type: string
          example: '2026-06-01 18:00:00'
        maxMembers:
          type: integer
        price:
          type: number
          format: double
        deposit:
          type: number
          format: double
        joinType:
          type: integer
          description: 0-审核制 1-自动通过
        dmId:
          type: integer
          format: int64

    PoolVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: integer
        ownerId:
          type: integer
          format: int64
        shopId:
          type: integer
          format: int64
        scriptId:
          type: integer
          format: int64
        scriptName:
          type: string
        scriptType:
          type: string
        city:
          type: string
        address:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        maxMembers:
          type: integer
        currentMembers:
          type: integer
        price:
          type: number
        deposit:
          type: number
        dmId:
          type: integer
          format: int64
        joinType:
          type: integer
        status:
          type: integer
          description: 0-开放 1-满员 2-拼车成功 3-剧本杀完成 4-已取消

    MemberVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        avatar:
          type: string
        role:
          type: integer
        status:
          type: integer
        selectedRole:
          type: string
        joinTime:
          type: string

    ConfirmRequest:
      type: object
      required: [confirmed]
      properties:
        confirmed:
          type: boolean

    ConfirmVO:
      type: object
      properties:
        poolId:
          type: integer
          format: int64
        confirmedCount:
          type: integer
        totalCount:
          type: integer
        completed:
          type: boolean

    RoleSelectRequest:
      type: object
      required: [roleName]
      properties:
        roleName:
          type: string

    RoleStatusVO:
      type: object
      properties:
        roleName:
          type: string
        selected:
          type: boolean
        userId:
          type: integer
          format: int64
        nickname:
          type: string

    OrderCreateRequest:
      type: object
      required: [poolId, type]
      properties:
        poolId:
          type: integer
          format: int64
        type:
          type: integer
          description: 0-押金 1-车费
        payeeId:
          type: integer
          format: int64
        payeeType:
          type: integer

    OrderVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderNo:
          type: string
        userId:
          type: integer
          format: int64
        poolId:
          type: integer
          format: int64
        type:
          type: integer
        amount:
          type: number
        status:
          type: integer
        payeeId:
          type: integer
          format: int64
        payeeType:
          type: integer
        releaseStatus:
          type: integer
        payTime:
          type: string

    ReviewCreateRequest:
      type: object
      required: [poolId, targetId, score]
