openapi: 3.0.3
info:
  title: 剧本杀拼车系统 API
  version: 2.4.0
  description: |
    JuPin 后端接口设计文档，可直接导入 Apifox。

    本地测试 Base URL: http://localhost:8080

    前端和 Nginx 未启动不影响接口测试，Apifox 直接请求 Spring Boot 后端即可。

    认证方式：
    - 注册/登录接口不需要 Token
    - 玩家端接口使用玩家 Token
    - 店家端接口使用店家 Token
    - 管理端接口使用管理员 Token
    - Header: Authorization: Bearer <accessToken>

    WebSocket:
    - 连接端点：/ws
    - 拼车状态订阅：/topic/pool/{poolId}
    - 群聊订阅：/topic/pool/{poolId}/chat
    - 匹配推送：/queue/match/{userId}
servers:
  - url: http://localhost:8080
    description: 本地开发环境

tags:
  - name: 认证
  - name: 玩家端-用户
  - name: 玩家端-剧本
  - name: 玩家端-拼车
  - name: 玩家端-订单
  - name: 玩家端-信用
  - name: 玩家端-评价
  - name: 玩家端-消息
  - name: 玩家端-群聊
  - name: 店家端-用户
  - name: 店家端-店铺
  - name: 店家端-剧本
  - name: 店家端-拼车
  - name: 店家端-订单
  - name: 店家端-评价
  - name: 店家端-群聊
  - name: 管理端-剧本
  - name: 管理端-用户

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      tags: [认证]
      summary: 用户注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              phone: '13800000001'
              password: abc123456
              nickname: 玩家一号
              gender: 1
              role: player
              city: 上海
      responses:
        '200':
          description: 注册成功，返回 Access Token、Refresh Token 和用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'

  /api/auth/login:
    post:
      tags: [认证]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              phone: '13800000001'
              password: abc123456
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'

  /api/auth/logout:
    post:
      tags: [认证]
      summary: 退出登录
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/auth/refresh:
    post:
      tags: [认证]
      summary: 刷新 Access Token
      description: Authorization Header 传 Refresh Token。
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResult'

  /api/player/user/me:
    get:
      tags: [玩家端-用户]
      summary: 获取当前玩家信息
      responses:
        '200':
          description: 当前玩家信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResult'
    put:
      tags: [玩家端-用户]
      summary: 修改当前玩家信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              nickname: 新昵称
              avatar: ''
              gender: 1
              city: 上海
              preference: 硬核,情感
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/script/list:
    get:
      tags: [玩家端-剧本]
      summary: 系统剧本库列表
      security: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 剧本列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptListResult'

  /api/player/pool/create:
    post:
      tags: [玩家端-拼车]
      summary: 发布玩家局
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PoolCreateRequest'
            example:
              scriptId: 1
              scriptName: 年轮
              scriptType: 硬核
              roles: '[{"name":"侦探","desc":"推理位"}]'
              city: 上海
              address: 静安区南京西路XX号
              startTime: '2026-06-01 14:00:00'
              endTime: '2026-06-01 18:00:00'
              maxMembers: 6
              price: 88
              deposit: 10
              joinType: 1
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolResult'

  /api/player/pool/list:
    get:
      tags: [玩家端-拼车]
      summary: 玩家端拼车列表
      security: []
      parameters:
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/ScriptType'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/PriceMin'
        - $ref: '#/components/parameters/PriceMax'
        - $ref: '#/components/parameters/StartTimeAfter'
        - $ref: '#/components/parameters/StartTimeBefore'
        - $ref: '#/components/parameters/Recommend'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 拼车列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolListResult'

  /api/player/preference:
    get:
      tags: [玩家端-偏好]
      summary: 获取当前玩家偏好
      responses:
        '200':
          description: 玩家偏好
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerPreferenceResult'
    put:
      tags: [玩家端-偏好]
      summary: 保存当前玩家偏好
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerPreferenceRequest'
            example:
              city: 上海
              scriptType: 硬核
              priceMin: 60
              priceMax: 120
              timeSlot: WEEKEND_NIGHT
              minMembers: 4
              maxMembers: 6
      responses:
        '200':
          description: 玩家偏好
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerPreferenceResult'

  /api/player/shop/list:
    get:
      tags: [玩家端-店铺]
      summary: 玩家端店铺列表
      parameters:
        - $ref: '#/components/parameters/City'
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 店铺列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopListResult'

  /api/player/shop/{shopId}:
    get:
      tags: [玩家端-店铺]
      summary: 玩家端店铺主页详情
      parameters:
        - $ref: '#/components/parameters/ShopId'
      responses:
        '200':
          description: 店铺详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResult'

  /api/player/shop/{shopId}/scripts:
    get:
      tags: [玩家端-店铺]
      summary: 玩家查看店铺剧本库
      parameters:
        - $ref: '#/components/parameters/ShopId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 店铺剧本库
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptListResult'

  /api/player/shop/{shopId}/pools:
    get:
      tags: [玩家端-店铺]
      summary: 玩家查看店铺下全部店家局
      parameters:
        - $ref: '#/components/parameters/ShopId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 店家局列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolListResult'

  /api/player/pool/{poolId}:
    get:
      tags: [玩家端-拼车]
      summary: 拼车详情
      security: []
      parameters:
        - $ref: '#/components/parameters/PoolId'
      responses:
        '200':
          description: 拼车详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PoolResult'

  /api/player/pool/{poolId}/price:
    put:
      tags: [玩家端-拼车]
      summary: 修改价格
      parameters:
        - $ref: '#/components/parameters/PoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: number
              format: double
            example: 99
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/pool/{poolId}/transfer-dm:
    put:
      tags: [玩家端-拼车]
      summary: 转让 DM
      parameters:
        - $ref: '#/components/parameters/PoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              format: int64
            example: 2
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/pool/{poolId}/join:
    post:
      tags: [玩家端-拼车]
      summary: 申请加入拼车
      parameters:
        - $ref: '#/components/parameters/PoolId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/pool/{poolId}/leave:
    post:
      tags: [玩家端-拼车]
      summary: 退出/跳车
      parameters:
        - $ref: '#/components/parameters/PoolId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/pool/{poolId}/approve/{userId}:
    post:
      tags: [玩家端-拼车]
      summary: 发布人通过申请
      parameters:
        - $ref: '#/components/parameters/PoolId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/pool/{poolId}/reject/{userId}:
    post:
      tags: [玩家端-拼车]
      summary: 发布人拒绝申请
      parameters:
        - $ref: '#/components/parameters/PoolId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/pool/{poolId}/complete:
    post:
      tags: [玩家端-拼车]
      summary: 发起拼车成功确认
      parameters:
        - $ref: '#/components/parameters/PoolId'
      responses:
        '200':
          description: 确认进度
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmResult'

  /api/player/pool/{poolId}/confirm:
    post:
      tags: [玩家端-拼车]
      summary: 提交确认
      parameters:
        - $ref: '#/components/parameters/PoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmRequest'
            example:
              confirmed: true
      responses:
        '200':
          description: 确认进度
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmResult'

  /api/player/pool/{poolId}/finish:
    post:
      tags: [玩家端-拼车]
      summary: 发起剧本杀完成确认
      parameters:
        - $ref: '#/components/parameters/PoolId'
      responses:
        '200':
          description: 确认进度
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmResult'

  /api/player/pool/{poolId}/members:
    get:
      tags: [玩家端-拼车]
      summary: 拼车成员列表
      parameters:
        - $ref: '#/components/parameters/PoolId'
      responses:
        '200':
          description: 成员列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberListResult'

  /api/player/pool/{poolId}/role/select:
    post:
      tags: [玩家端-拼车]
      summary: 选择剧本角色
      parameters:
        - $ref: '#/components/parameters/PoolId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleSelectRequest'
            example:
              roleName: 侦探
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/pool/{poolId}/roles:
    get:
      tags: [玩家端-拼车]
      summary: 角色列表及选择状态
      parameters:
        - $ref: '#/components/parameters/PoolId'
      responses:
        '200':
          description: 角色选择状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleStatusListResult'

  /api/player/order/create:
    post:
      tags: [玩家端-订单]
      summary: 创建订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            example:
              poolId: 1
              type: 0
      responses:
        '200':
          description: 订单信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResult'

  /api/player/order/pay/{orderNo}:
    post:
      tags: [玩家端-订单]
      summary: 模拟支付
      parameters:
        - name: orderNo
          in: path
          required: true
          schema:
            type: string
          example: '202605210001'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/order/my:
    get:
      tags: [玩家端-订单]
      summary: 我的订单
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: integer
          description: 0-押金 1-车费
        - name: status
          in: query
          required: false
          schema:
            type: integer
          description: 0-待支付 1-已支付 2-已退款 3-已扣留 4-逾期
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 我的订单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResult'

  /api/player/credit/score:
    get:
      tags: [玩家端-信用]
      summary: 我的信用分
      responses:
        '200':
          description: 信用分
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegerResult'

  /api/player/credit/log:
    get:
      tags: [玩家端-信用]
      summary: 信用分流水
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 信用流水
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditLogListResult'

  /api/player/review/create:
    post:
      tags: [玩家端-评价]
      summary: 提交评价
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
            example:
              poolId: 1
              targetId: 1
              type: 1
              score: 5
              content: 体验很好
              tags: 准时,逻辑清晰
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/review/my-dm:
    get:
      tags: [玩家端-评价]
      summary: 我作为 DM 收到的评价
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 评价列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListResult'

  /api/player/message/list:
    get:
      tags: [玩家端-消息]
      summary: 消息列表
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: integer
        - name: isRead
          in: query
          required: false
          schema:
            type: integer
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 消息列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResult'

  /api/player/message/unread-count:
    get:
      tags: [玩家端-消息]
      summary: 未读消息数
      responses:
        '200':
          description: 未读数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegerResult'

  /api/player/message/read/{msgId}:
    put:
      tags: [玩家端-消息]
      summary: 标记单条消息已读
      parameters:
        - name: msgId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/message/read-all:
    put:
      tags: [玩家端-消息]
      summary: 全部消息已读
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/chat/send:
    post:
      tags: [玩家端-群聊]
      summary: 发送群聊消息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendRequest'
            example:
              pool_id: 1
              content: 大家几点到？
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/player/chat/history:
    get:
      tags: [玩家端-群聊]
      summary: 群聊历史
      parameters:
        - name: poolId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 群聊历史
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageListResult'

  /api/shop/user/me:
    get:
      tags: [店家端-用户]
      summary: 当前店家账号信息
      responses:
        '200':
          description: 店家账号信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResult'
    put:
      tags: [店家端-用户]
      summary: 修改店家账号信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/shop/create:
    post:
      tags: [店家端-店铺]
      summary: 创建店铺
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopCreateRequest'
            example:
              name: 静安剧本杀馆
              address: 上海市静安区南京西路XXX号
              phone: 021-12345678
              logo: ''
              cover: ''
              description: 主打硬核推理和情感本
              openingHours: 10:00-22:00
              city: 上海
      responses:
        '200':
          description: 店铺信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResult'

  /api/shop/my:
    get:
      tags: [店家端-店铺]
      summary: 我的店铺信息
      responses:
        '200':
          description: 店铺信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResult'

  /api/shop/current:
    get:
      tags: [店家端-店铺]
      summary: 当前店家账号绑定店铺
      responses:
        '200':
          description: 当前绑定店铺
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResult'

  /api/shop/update:
    put:
      tags: [店家端-店铺]
      summary: 修改店铺信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopUpdateRequest'
      responses:
        '200':
          description: 店铺信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopResult'

  /api/shop/search:
    get:
      tags: [店家端-店铺]
      summary: 搜索店铺
      security: []
      parameters:
        - $ref: '#/components/parameters/City'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 店铺列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopListResult'

  /api/shop/join:
    post:
      tags: [店家端-店铺]
      summary: 申请加入店铺
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShopJoinRequest'
            example:
              shopId: 1
      responses:
        '200':
          $ref: '#/components/responses/Ok'

  /api/shop/{shopId}/members:
    get:
      tags: [店家端-店铺]
      summary: 店铺成员列表
      parameters:
        - $ref: '#/components/parameters/ShopId'
      responses:
        '200':
          description: 店铺成员列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopMemberListResult'

  /api/shop/{shopId}/members/add:
    post:
      tags: [店家端-店铺]
